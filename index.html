<!doctype html>
<html lang="my">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/images/web_logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@300;400;500;600;700;800&family=Nunito:wght@400;600;700;800&family=Padauk:wght@400;700&family=Noto+Serif+Myanmar:wght@400;700&family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <title>Ta'ang Land Government of Immigration Department</title>

  <style>
    /* ── Native Splash Screen ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Ring wrapper */
    .splash-ring-wrap {
      position: relative;
      width: 160px;
      height: 160px;
    }

    /* Outer SVG ring – spins */
    .splash-ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      animation: splash-spin 3s linear infinite;
    }
    /* Counter-spin inner ring */
    .splash-ring-svg-inner {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      animation: splash-spin 5s linear infinite reverse;
    }

    /* Orbiting dot wrapper */
    .splash-orbit {
      position: absolute;
      inset: 0;
      animation: splash-spin 3s linear infinite;
    }
    .splash-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4AF37, #c9a02e);
      box-shadow: 0 0 12px rgba(212,175,55,0.65);
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Logo */
    .splash-logo-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: splash-breathe 2.5s ease-in-out infinite;
    }
    .splash-logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      border-radius: 50%;
      filter: drop-shadow(0 2px 12px rgba(212,175,55,0.3));
    }

    /* Text */
    .splash-text {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .splash-label {
      font-family: "Padauk", "Times New Roman", serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #6b5c3e;
      animation: splash-fade 2s ease-in-out infinite;
    }
    .splash-dots {
      display: flex;
      gap: 6px;
    }
    .splash-dots span {
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #D4AF37;
    }
    .splash-dots span:nth-child(1) { animation: splash-bounce 1.4s ease-in-out 0s   infinite; }
    .splash-dots span:nth-child(2) { animation: splash-bounce 1.4s ease-in-out 0.2s infinite; }
    .splash-dots span:nth-child(3) { animation: splash-bounce 1.4s ease-in-out 0.4s infinite; }

    /* Keyframes */
    @keyframes splash-spin    { to { transform: rotate(360deg); } }
    @keyframes splash-breathe {
      0%, 100% { transform: scale(1);    opacity: 1;    }
      50%       { transform: scale(1.06); opacity: 0.85; }
    }
    @keyframes splash-fade {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1;   }
    }
    @keyframes splash-bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1;   }
    }
  </style>
</head>

<body>
  <!-- Native splash: visible BEFORE React boots (covers page refresh) -->
  <div id="splash">
    <div class="splash-ring-wrap">
      <!-- Outer gradient ring -->
      <svg class="splash-ring-svg" viewBox="0 0 160 160">
        <defs>
          <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#D4AF37" stop-opacity="1" />
            <stop offset="50%"  stop-color="#228B22" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.1" />
          </linearGradient>
        </defs>
        <circle cx="80" cy="80" r="72" fill="none"
          stroke="url(#sg)" stroke-width="3"
          stroke-linecap="round" stroke-dasharray="340 120"/>
      </svg>
      <!-- Counter ring -->
      <svg class="splash-ring-svg-inner" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="66" fill="none"
          stroke="#D4AF37" stroke-width="1"
          stroke-linecap="round" stroke-dasharray="60 350"
          opacity="0.35"/>
      </svg>
      <!-- Orbiting dot -->
      <div class="splash-orbit">
        <div class="splash-dot"></div>
      </div>
      <!-- Emblem -->
      <div class="splash-logo-wrap">
        <img class="splash-logo" src="/image.png" alt="Ta'ang Land Emblem" />
      </div>
    </div>

    <div class="splash-text">
      <p class="splash-label">Loading</p>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
